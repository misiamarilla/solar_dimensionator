{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>


<meta charset="UTF-8">
<title>Solar Dimensioning</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com">

<link rel="stylesheet" href="{% static 'css/app.css' %}">
<script defer src="{% static 'js/app.js' %}"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg:#f6f8fb;
--panel:#ffffff;
--border:#e6eaf1;

--primary:#2563eb;
--primary-soft:#dbeafe;

--text:#0f172a;
--muted:#64748b;

--radius:12px;
--shadow:0 10px 30px rgba(0,0,0,0.08);

}

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);

}

.app{
display:flex;
height:100vh;
}

.sidebar{

width:340px;
background:var(--panel);
border-right:1px solid var(--border);
padding:32px;
overflow:auto;

}

.logo{

font-weight:600;
font-size:18px;
margin-bottom:28px;

}

.section{

margin-bottom:40px;

}

.section h2{

font-size:14px;
font-weight:600;
margin-bottom:16px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:.04em;

}

.grid{

display:grid;
gap:12px;

}

input{

padding:11px 12px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
background:white;

}

input:focus{

outline:none;
border-color:var(--primary);

}

button{

margin-top:12px;

background:var(--primary);
color:white;

border:none;
padding:11px 14px;

border-radius:8px;

font-weight:500;
font-size:14px;

cursor:pointer;

transition:.15s;

}

button:hover{

background:#1d4ed8;

}

.content{

flex:1;
padding:48px;
overflow:auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

}

.header h1{

font-size:22px;
font-weight:600;

}

.results{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;

}

.card{

background:var(--panel);
border:1px solid var(--border);

border-radius:var(--radius);

padding:22px;

box-shadow:var(--shadow);

transition:.15s;

}

.card:hover{

border-color:var(--primary-soft);
transform:translateY(-2px);

}

.card-title{

font-size:13px;
color:var(--muted);

margin-bottom:8px;

text-transform:capitalize;

}

.card-value{

font-size:20px;
font-weight:600;

}

.empty{

padding:40px;
border-radius:var(--radius);
background:var(--panel);
border:1px dashed var(--border);
text-align:center;
color:var(--muted);

}

</style>

</head>

<body>

<div class="app">

{% block content %}
{% endblock %}

</div>

</body>

</html>
